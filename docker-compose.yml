services:
  mysql:
    image: mysql:8.0
    container_name: 3xui_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${XUI_MYSQL_PASSWORD:-changeme}
      MYSQL_DATABASE: ${XUI_MYSQL_DBNAME:-x-ui}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  3xui:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: 3xui_app
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
      XUI_DB_TYPE: "mysql"
      XUI_MYSQL_HOST: "127.0.0.1"
      XUI_MYSQL_PORT: "3306"
      XUI_MYSQL_USER: "${XUI_MYSQL_USER:-root}"
      XUI_MYSQL_PASSWORD: "${XUI_MYSQL_PASSWORD:-changeme}"
      XUI_MYSQL_DBNAME: "${XUI_MYSQL_DBNAME:-x-ui}"
    tty: true
    network_mode: host
    restart: unless-stopped

volumes:
  mysql_data:
