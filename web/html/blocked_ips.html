<a-layout id="app" v-cloak :class="themeSwitcher.currentTheme + ' blocked-ips-page'">
  <a-sidebar></a-sidebar>
  <a-layout id="content-layout">
    <a-layout-content>
      <a-spin :spinning="loading" :delay="200" tip='{{ i18n "loading" }}'>
        <transition name="list" appear>
          <template>
            <a-row v-if="loading && !fetched">
              <a-card style="text-align:center;padding:30px 0;margin-top:10px;background:transparent;border:none">
                <a-spin tip='{{ i18n "loading" }}'></a-spin>
              </a-card>
            </a-row>
            <a-row :gutter="[isMobile ? 8 : 16, isMobile ? 8 : 12]" v-else>

              <!-- Stats -->
              <a-col :xs="24" :sm="8">
                <a-card hoverable>
                  <div class="stat-box">
                    <div class="stat-icon-wrap red"><a-icon type="lock" /></div>
                    <div class="stat-info">
                      <div class="stat-val">[[ stats.active ]]</div>
                      <div class="stat-lbl">Active Blocks</div>
                    </div>
                  </div>
                </a-card>
              </a-col>
              <a-col :xs="12" :sm="8">
                <a-card hoverable>
                  <div class="stat-box">
                    <div class="stat-icon-wrap green"><a-icon type="unlock" /></div>
                    <div class="stat-info">
                      <div class="stat-val">[[ stats.unblocked ]]</div>
                      <div class="stat-lbl">Unblocked</div>
                    </div>
                  </div>
                </a-card>
              </a-col>
              <a-col :xs="12" :sm="8">
                <a-card hoverable>
                  <div class="stat-box">
                    <div class="stat-icon-wrap blue"><a-icon type="database" /></div>
                    <div class="stat-info">
                      <div class="stat-val">[[ stats.total ]]</div>
                      <div class="stat-lbl">Total Records</div>
                    </div>
                  </div>
                </a-card>
              </a-col>

              <!-- Table Card -->
              <a-col :xs="24">
                <a-card hoverable>
                  <template #title>
                    <a-space direction="horizontal">
                      <a-icon type="safety-certificate" style="font-size:16px" />
                      <span>IP Access Control</span>
                    </a-space>
                  </template>
                  <template #extra>
                    <a-space>
                      <a-tooltip title="Refresh">
                        <a-button size="small" shape="circle" icon="sync"
                          @click="fetchBlockedIPs" :loading="refreshing" />
                      </a-tooltip>
                      <a-popconfirm title="Unblock all active IPs?" ok-text="Yes" cancel-text="No"
                        @confirm="clearAll" :overlay-class-name="themeSwitcher.currentTheme">
                        <a-tooltip title="Unblock All">
                          <a-button size="small" type="danger" shape="circle" icon="delete"
                            :disabled="stats.active === 0" />
                        </a-tooltip>
                      </a-popconfirm>
                    </a-space>
                  </template>

                  <!-- Filters -->
                  <div class="filter-row">
                    <a-input-search v-model="filters.search" placeholder="Search IP or email..."
                      allow-clear size="small" @search="applyFilters" @change="applyFilters" />
                    <a-select v-model="filters.status" size="small" @change="applyFilters"
                      :dropdown-class-name="themeSwitcher.currentTheme">
                      <a-select-option value="all">All Status</a-select-option>
                      <a-select-option value="active">Active Only</a-select-option>
                      <a-select-option value="unblocked">Unblocked Only</a-select-option>
                    </a-select>
                    <a-select v-model="filters.sortBy" size="small" @change="applyFilters"
                      :dropdown-class-name="themeSwitcher.currentTheme">
                      <a-select-option value="newest">Newest First</a-select-option>
                      <a-select-option value="oldest">Oldest First</a-select-option>
                      <a-select-option value="email">By Email</a-select-option>
                    </a-select>
                  </div>

                  <!-- Empty State -->
                  <div v-if="fetched && filteredIPs.length === 0" class="empty-box">
                    <div class="empty-box-icon"><a-icon type="safety-certificate" /></div>
                    <div class="empty-box-title">No Blocked IPs</div>
                    <div class="empty-box-desc">
                      All clients are within their IP limits. Blocked IPs will appear here when a client exceeds its connection limit.
                    </div>
                  </div>

                  <!-- Table -->
                  <a-table v-else
                    :columns="columns"
                    :data-source="filteredIPs"
                    :row-key="record => record.id"
                    :pagination="filteredIPs.length > 10 ? { pageSize: 15, size: 'small', showSizeChanger: true, pageSizeOptions: ['10','15','30','50'], showTotal: (total) => total + ' records' } : false"
                    :scroll="isMobile ? { x: 650 } : {}"
                    size="small"
                  >
                    <template slot="ip" slot-scope="text, record">
                      <span class="ip-cell">
                        <a-icon :type="record.active ? 'lock' : 'unlock'"
                          :style="{ color: record.active ? '#e04141' : '#52c41a', marginRight: '6px', fontSize: '12px' }" />
                        [[ text ]]
                      </span>
                    </template>

                    <template slot="clientEmail" slot-scope="text">
                      <a-tooltip :title="text" :overlay-class-name="themeSwitcher.currentTheme">
                        <span class="email-cell">[[ text || '—' ]]</span>
                      </a-tooltip>
                    </template>

                    <template slot="blockedAt" slot-scope="text">
                      <span class="time-cell">[[ formatTime(text) ]]</span>
                    </template>

                    <template slot="duration" slot-scope="text, record">
                      <a-tag v-if="record.active" color="red" style="margin:0;font-size:11px">
                        [[ getDuration(record) ]]
                      </a-tag>
                      <span v-else class="dur-cell" style="color:#52c41a">[[ getDuration(record) ]]</span>
                    </template>

                    <template slot="status" slot-scope="text, record">
                      <a-badge v-if="record.active" status="error" text="Blocked" />
                      <a-badge v-else status="success" text="Released" />
                    </template>

                    <template slot="action" slot-scope="text, record">
                      <a-popconfirm v-if="record.active" title="Unblock this IP?"
                        ok-text="Yes" cancel-text="No" @confirm="unblockIP(record.id)"
                        :overlay-class-name="themeSwitcher.currentTheme">
                        <a-button size="small" type="primary" ghost style="border-radius:6px">
                          <a-icon type="unlock" /> Unblock
                        </a-button>
                      </a-popconfirm>
                      <a-tag v-else color="green" style="margin:0;border-radius:6px">
                        <a-icon type="check-circle" /> Done
                      </a-tag>
                    </template>
                  </a-table>

                </a-card>
              </a-col>
            </a-row>
          </template>
        </transition>
      </a-spin>
    </a-layout-content>
  </a-layout>
</a-layout>

<script>
  const app = new Vue({
    delimiters: ['[[', ']]'],
    el: '#app',
    mixins: [MediaQueryMixin],
    data: {
      themeSwitcher,
      loading: true,
      fetched: false,
      refreshing: false,
      blockedIPs: [],
      filteredIPs: [],
      filters: {
        search: '',
        status: 'all',
        sortBy: 'newest',
      },
      columns: [
        { title: 'IP Address', dataIndex: 'ip', key: 'ip', scopedSlots: { customRender: 'ip' }, width: 180 },
        { title: 'Client', dataIndex: 'clientEmail', key: 'clientEmail', scopedSlots: { customRender: 'clientEmail' }, ellipsis: true },
        { title: 'Blocked At', dataIndex: 'blockedAt', key: 'blockedAt', scopedSlots: { customRender: 'blockedAt' }, width: 160 },
        { title: 'Duration', key: 'duration', scopedSlots: { customRender: 'duration' }, width: 100 },
        { title: 'Status', key: 'status', scopedSlots: { customRender: 'status' }, width: 100 },
        { title: '', key: 'action', scopedSlots: { customRender: 'action' }, width: 110, fixed: 'right' },
      ],
    },
    computed: {
      stats() {
        const active = this.blockedIPs.filter(ip => ip.active).length;
        return {
          active,
          unblocked: this.blockedIPs.filter(ip => !ip.active).length,
          total: this.blockedIPs.length,
        };
      },
    },
    methods: {
      async fetchBlockedIPs() {
        this.refreshing = true;
        try {
          const msg = await HttpUtil.get('/panel/api/inbounds/blockedIps');
          if (msg.success) {
            this.blockedIPs = msg.obj || [];
            this.applyFilters();
          }
        } catch (e) {
          console.error('Failed to fetch blocked IPs:', e);
        }
        this.loading = false;
        this.fetched = true;
        this.refreshing = false;
      },

      applyFilters() {
        let result = [...this.blockedIPs];

        if (this.filters.status === 'active') {
          result = result.filter(ip => ip.active);
        } else if (this.filters.status === 'unblocked') {
          result = result.filter(ip => !ip.active);
        }

        if (this.filters.search) {
          const q = this.filters.search.toLowerCase();
          result = result.filter(ip =>
            (ip.ip && ip.ip.toLowerCase().includes(q)) ||
            (ip.clientEmail && ip.clientEmail.toLowerCase().includes(q))
          );
        }

        if (this.filters.sortBy === 'newest') {
          result.sort((a, b) => b.blockedAt - a.blockedAt);
        } else if (this.filters.sortBy === 'oldest') {
          result.sort((a, b) => a.blockedAt - b.blockedAt);
        } else if (this.filters.sortBy === 'email') {
          result.sort((a, b) => (a.clientEmail || '').localeCompare(b.clientEmail || ''));
        }

        this.filteredIPs = result;
      },

      async unblockIP(id) {
        try {
          const msg = await HttpUtil.post('/panel/api/inbounds/unblockIp/' + id);
          if (msg.success) {
            this.$message.success('IP unblocked successfully');
            await this.fetchBlockedIPs();
          }
        } catch (e) {
          this.$message.error('Failed to unblock IP');
        }
      },

      async clearAll() {
        try {
          const msg = await HttpUtil.post('/panel/api/inbounds/clearBlockedIps');
          if (msg.success) {
            this.$message.success('All blocked IPs cleared');
            await this.fetchBlockedIPs();
          }
        } catch (e) {
          this.$message.error('Failed to clear blocked IPs');
        }
      },

      formatTime(timestamp) {
        if (!timestamp) return '—';
        const d = new Date(timestamp * 1000);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      },

      getDuration(record) {
        if (!record.blockedAt) return '—';
        const start = record.blockedAt * 1000;
        const end = record.active ? Date.now() : (record.unblockedAt ? record.unblockedAt * 1000 : Date.now());
        const diff = Math.max(0, end - start);
        const sec = Math.floor(diff / 1000);
        if (sec < 60) return sec + 's';
        const min = Math.floor(sec / 60);
        if (min < 60) return min + 'm ' + (sec % 60) + 's';
        const hr = Math.floor(min / 60);
        if (hr < 24) return hr + 'h ' + (min % 60) + 'm';
        const d = Math.floor(hr / 24);
        return d + 'd ' + (hr % 24) + 'h';
      },
    },
    async mounted() {
      await this.fetchBlockedIPs();
    },
  });
</script>
