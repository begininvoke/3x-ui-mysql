{{define "settings/panel/database"}}
<a-collapse default-active-key="1">
    <a-collapse-panel key="1" header='{{ i18nf "pages.settings.dbSettings" "Database" }}'>
        <a-alert type="info" :style="{ marginBottom: '16px' }"
            message='{{ i18nf "pages.settings.dbSettingsDesc" "Database settings come from environment variables (XUI_DB_TYPE, XUI_MYSQL_*). Restart the panel after changes." }}' show-icon>
        </a-alert>
        <a-setting-list-item paddings="small">
            <template #title>{{ i18nf "pages.settings.dbType" "Database Type" }}</template>
            <template #description>{{ i18nf "pages.settings.dbTypeDesc" "Current database backend (sqlite or mysql). Set via XUI_DB_TYPE environment variable." }}</template>
            <template #control>
                <a-input type="text" :value="resolvedDbType" disabled></a-input>
            </template>
        </a-setting-list-item>
        <template v-if="isMysqlDatabase">
            <a-setting-list-item paddings="small">
                <template #title>{{ i18nf "pages.settings.mysqlHost" "MySQL Host" }}</template>
                <template #control>
                    <a-input type="text" v-model="allSetting.mysqlHost" disabled></a-input>
                </template>
            </a-setting-list-item>
            <a-setting-list-item paddings="small">
                <template #title>{{ i18nf "pages.settings.mysqlPort" "MySQL Port" }}</template>
                <template #control>
                    <a-input-number :min="1" :max="65535" v-model="allSetting.mysqlPort" disabled :style="{ width: '100%' }"></a-input-number>
                </template>
            </a-setting-list-item>
            <a-setting-list-item paddings="small">
                <template #title>{{ i18nf "pages.settings.mysqlUser" "MySQL User" }}</template>
                <template #control>
                    <a-input type="text" v-model="allSetting.mysqlUser" disabled></a-input>
                </template>
            </a-setting-list-item>
            <a-setting-list-item paddings="small">
                <template #title>{{ i18nf "pages.settings.mysqlDBName" "MySQL Database Name" }}</template>
                <template #control>
                    <a-input type="text" v-model="allSetting.mysqlDBName" disabled></a-input>
                </template>
            </a-setting-list-item>
        </template>
    </a-collapse-panel>
</a-collapse>

<template v-if="isMysqlDatabase">
<a-collapse default-active-key="1" :style="{ marginTop: '16px' }">
    <a-collapse-panel key="1" header='{{ i18nf "pages.settings.dbConnectionStatus" "Connection status" }}'>
        <a-alert :type="dbStatus.healthy ? 'success' : 'error'" :style="{ marginBottom: '16px' }" show-icon>
            <template #message>
                <span v-if="dbStatus.healthy">
                    <a-icon type="check-circle" :style="{ marginRight: '8px' }" />
                    {{ i18nf "pages.settings.dbHealthy" "Healthy" }} — [[ dbStatus.host ]]:[[ dbStatus.port ]]/[[ dbStatus.dbName ]]
                </span>
                <span v-else>
                    <a-icon type="close-circle" :style="{ marginRight: '8px' }" />
                    {{ i18nf "pages.settings.dbUnhealthy" "Unhealthy" }} — [[ dbStatus.pingError ]]
                </span>
            </template>
        </a-alert>
        <a-alert type="info" :style="{ marginBottom: '16px' }"
            message='{{ i18nf "pages.settings.dbConnectionStatusDesc" "Live connection pool statistics. Refreshes every 5 seconds when Auto is on." }}' show-icon>
        </a-alert>

        <a-row :gutter="[16, 16]">
            <a-col :xs="12" :sm="8" :md="6">
                <a-statistic title='{{ i18nf "pages.settings.dbPingLatency" "Ping latency" }}' :value="dbStatus.pingLatency"
                    :value-style="{ color: dbStatus.healthy ? '#3f8600' : '#cf1322' }">
                    <template #prefix>
                        <a-icon :type="dbStatus.healthy ? 'check-circle' : 'close-circle'" />
                    </template>
                </a-statistic>
            </a-col>
            <a-col :xs="12" :sm="8" :md="6">
                <a-statistic title='{{ i18nf "pages.settings.dbPoolOpen" "Open connections" }}' :value="dbStatus.openConnections">
                    <template #suffix>
                        <span :style="{ fontSize: '14px', color: '#999' }"> / [[ dbStatus.maxOpenConns ]]</span>
                    </template>
                </a-statistic>
            </a-col>
            <a-col :xs="12" :sm="8" :md="6">
                <a-statistic title='{{ i18nf "pages.settings.dbPoolInUse" "In use" }}' :value="dbStatus.inUse"
                    :value-style="{ color: dbStatus.inUse > 0 ? '#1890ff' : '#3f8600' }">
                </a-statistic>
            </a-col>
            <a-col :xs="12" :sm="8" :md="6">
                <a-statistic title='{{ i18nf "pages.settings.dbPoolIdle" "Idle" }}' :value="dbStatus.idle"
                    :value-style="{ color: '#3f8600' }">
                </a-statistic>
            </a-col>
        </a-row>

        <a-divider :style="{ margin: '16px 0' }" />

        <a-row :gutter="[16, 16]">
            <a-col :xs="12" :sm="8" :md="6">
                <a-statistic title='{{ i18nf "pages.settings.dbPoolWaitCount" "Wait count" }}' :value="dbStatus.waitCount"
                    :value-style="{ color: dbStatus.waitCount > 0 ? '#faad14' : '#3f8600' }">
                </a-statistic>
            </a-col>
            <a-col :xs="12" :sm="8" :md="6">
                <a-statistic title='{{ i18nf "pages.settings.dbPoolWaitDuration" "Total wait time" }}' :value="dbStatus.waitDuration">
                </a-statistic>
            </a-col>
            <a-col :xs="12" :sm="8" :md="6">
                <a-statistic title='{{ i18nf "pages.settings.dbPoolMaxIdleClosed" "Closed (max idle)" }}' :value="dbStatus.maxIdleClosed">
                </a-statistic>
            </a-col>
            <a-col :xs="12" :sm="8" :md="6">
                <a-statistic title='{{ i18nf "pages.settings.dbPoolMaxLifetimeClosed" "Closed (max lifetime)" }}' :value="dbStatus.maxLifetimeClosed">
                </a-statistic>
            </a-col>
        </a-row>

        <a-divider :style="{ margin: '16px 0' }" />

        <a-card size="small" bordered :body-style="{ padding: '12px 16px 16px' }" class="db-query-log-card">
            <template slot="title">
                <span :style="{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: '10px' }">
                    <a-icon type="code" :style="{ fontSize: '18px', opacity: 0.85 }" />
                    <span :style="{ fontWeight: 600, fontSize: '15px' }">{{ i18nf "pages.settings.dbQueryLogTitle" "Recent SQL (panel queries)" }}</span>
                    <a-tag v-if="dbQueryLogCount > 0" color="blue">[[ dbQueryLogCount ]] {{ i18nf "pages.settings.dbQueryLogEntries" "entries" }}</a-tag>
                    <a-tag v-else color="default">{{ i18nf "pages.settings.dbQueryLogNoEntries" "No entries yet" }}</a-tag>
                </span>
            </template>
            <a-alert type="warning" show-icon
                :style="{ marginBottom: '14px', borderRadius: '8px' }">
                <template slot="message">
                    <span :style="{ fontWeight: 600 }">{{ i18nf "pages.settings.dbQueryLogPrivacyTitle" "Admin-only query log" }}</span>
                </template>
                <template slot="description">
                    <span :style="{ fontSize: '13px', lineHeight: 1.6, opacity: 0.95 }">
                        {{ i18nf "pages.settings.dbQueryLogWarn" "SQL may contain sensitive values. Only logged-in admins see this list. Each statement is truncated to 4000 characters." }}
                    </span>
                </template>
            </a-alert>
            <a-table
                :columns="dbQueryLogColumns"
                :data-source="dbStatus.recentQueries || []"
                :row-key="dbQueryRowKey"
                :pagination="false"
                bordered
                size="middle"
                :scroll="{ x: 860 }"
                :locale="{ emptyText: '{{ i18nf "pages.settings.dbQueryLogEmpty" "No queries recorded yet. Use the panel to generate traffic." }}' }">
                <template slot="dbQtime" slot-scope="text">
                    <a-tooltip v-if="text" :title="text" placement="topLeft">
                        <span :style="{
                          cursor: 'help',
                          borderBottom: themeSwitcher.currentTheme === 'dark' ? '1px dashed rgba(255,255,255,0.35)' : '1px dashed rgba(0,0,0,0.22)',
                          fontVariantNumeric: 'tabular-nums',
                          fontSize: '13px'
                        }">[[ formatQueryLogTime(text) ]]</span>
                    </a-tooltip>
                    <span v-else :style="{ color: '#8c8c8c' }">—</span>
                </template>
                <template slot="dbQdur" slot-scope="ms">
                    <span :style="{
                      color: queryLogDurationColor(ms),
                      fontWeight: 600,
                      fontVariantNumeric: 'tabular-nums',
                      fontSize: '13px'
                    }">
                        [[ formatQueryDuration(ms) ]]
                    </span>
                    <span :style="{ fontSize: '12px', color: '#8c8c8c', marginLeft: '2px' }">ms</span>
                </template>
                <template slot="dbQsql" slot-scope="text">
                    <div :style="dbQuerySqlCellStyle">[[ text || '—' ]]</div>
                </template>
                <template slot="dbQerr" slot-scope="text">
                    <a-tooltip v-if="text && String(text).trim()" :title="text" placement="left">
                        <a-tag color="red" :style="{ margin: 0, cursor: 'help', maxWidth: '100%' }">
                            {{ i18nf "pages.settings.dbQueryLogFailed" "Failed" }}
                        </a-tag>
                    </a-tooltip>
                    <a-tag v-else color="green" :style="{ margin: 0 }">OK</a-tag>
                </template>
            </a-table>
        </a-card>

        <a-divider :style="{ margin: '16px 0' }" />

        <a-row>
            <a-col :span="24" :style="{ textAlign: 'right' }">
                <a-button type="primary" icon="reload" @click="fetchDbStatus" :loading="dbStatusLoading">
                    {{ i18nf "pages.settings.dbRefresh" "Refresh" }}
                </a-button>
                <a-switch :style="{ marginLeft: '12px' }" v-model="dbAutoRefresh"
                    checked-children="Auto" un-checked-children="Manual" />
            </a-col>
        </a-row>
    </a-collapse-panel>
</a-collapse>
</template>
{{end}}
