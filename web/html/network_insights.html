<style>
  .network-insights-page .ant-card { margin-bottom: 0 !important; }
  .network-insights-page .ant-col { display: flex; }
  .network-insights-page .ant-col > .ant-card { width: 100%; flex: 1; }
  .network-insights-page .ant-card-body { padding: 16px; }

  @media (min-width: 769px) {
    .network-insights-page .ant-layout-content { margin: 24px 16px; }
  }
  @media (max-width: 768px) {
    .network-insights-page .ant-card-body { padding: 12px; }
  }

  .network-insights-page .stat-box {
    display: flex; align-items: center; gap: 14px; padding: 4px 0;
  }
  .network-insights-page .stat-icon-wrap {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 22px;
  }
  .network-insights-page .stat-icon-wrap.blue { background: rgba(24,144,255,0.1); color: #1890ff; }
  .network-insights-page .stat-icon-wrap.green { background: rgba(82,196,26,0.1); color: #52c41a; }
  .network-insights-page .stat-icon-wrap.orange { background: rgba(250,140,22,0.12); color: #fa8c16; }
  .network-insights-page .stat-icon-wrap.purple { background: rgba(114,46,209,0.1); color: #722ed1; }
  .network-insights-page.dark .stat-icon-wrap.blue { background: rgba(24,144,255,0.15); color: #40a9ff; }
  .network-insights-page.dark .stat-icon-wrap.green { background: rgba(82,196,26,0.15); color: #73d13d; }
  .network-insights-page.dark .stat-icon-wrap.orange { background: rgba(250,140,22,0.15); color: #ffc069; }
  .network-insights-page.dark .stat-icon-wrap.purple { background: rgba(114,46,209,0.15); color: #b37feb; }

  .network-insights-page .stat-val {
    font-size: 24px; font-weight: 700; line-height: 1.2;
    color: rgba(0,0,0,0.85);
  }
  .network-insights-page.dark .stat-val { color: rgba(255,255,255,0.85); }
  .network-insights-page .stat-lbl {
    font-size: 12px; color: rgba(0,0,0,0.45); margin-top: 2px;
  }
  .network-insights-page.dark .stat-lbl { color: rgba(255,255,255,0.4); }
  .network-insights-page .stat-sub {
    font-size: 11px; color: rgba(0,0,0,0.35); margin-top: 2px;
  }
  .network-insights-page.dark .stat-sub { color: rgba(255,255,255,0.3); }

  .network-insights-page .filter-row {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .network-insights-page .filter-row > .ant-select { min-width: 140px; }
  .network-insights-page .filter-row > .ant-input-search { flex: 1; min-width: 180px; max-width: 320px; }

  .network-insights-page .section-label {
    font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.75); margin: 18px 0 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .network-insights-page.dark .section-label { color: rgba(255,255,255,0.75); }
  .network-insights-page .section-hint {
    font-size: 12px; color: rgba(0,0,0,0.45); margin: -4px 0 12px;
  }
  .network-insights-page.dark .section-hint { color: rgba(255,255,255,0.35); }

  .network-insights-page .mono-cell {
    font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
    font-size: 12px;
  }

  .network-insights-page .empty-box {
    text-align: center; padding: 32px 16px;
  }
  .network-insights-page .empty-box-icon {
    font-size: 40px; color: rgba(0,0,0,0.12); margin-bottom: 10px;
  }
  .network-insights-page.dark .empty-box-icon { color: rgba(255,255,255,0.1); }
  .network-insights-page .empty-box-title {
    font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.65); margin-bottom: 4px;
  }
  .network-insights-page.dark .empty-box-title { color: rgba(255,255,255,0.6); }
  .network-insights-page .empty-box-desc {

  .network-insights-page .ant-table:not(.ant-table-expanded-row .ant-table) {

    background: inherit !important;
  }

  .network-insights-page .ant-btn-sm {
    background: transparent !important;
  }
  .network-insights-page.dark .ant-btn-sm {
    background: transparent !important;
    color: rgba(255,255,255,0.65) !important;
    border-color: rgba(255,255,255,0.15) !important;
  }
  .network-insights-page.dark .ant-btn-sm:hover {

  }

  .network-insights-page .event-tag-proxied { color: #1890ff; }
  .network-insights-page .event-tag-direct { color: #52c41a; }

  .network-insights-page .ni-overview-tabs.ant-tabs { margin-top: 2px; }
  .network-insights-page .ni-overview-tabs > .ant-tabs-bar {
    margin-bottom: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .network-insights-page.dark .ni-overview-tabs > .ant-tabs-bar {
    border-bottom-color: rgba(255,255,255,0.08);
  }
  .network-insights-page .ni-overview-tabs .ant-tabs-nav .ant-tabs-tab {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
  }
  .network-insights-page .ni-overview-tabs .ant-tabs-ink-bar { height: 2px; border-radius: 1px; }
  .network-insights-page .event-cell-outbound {
    font-size: 11px;
    margin-top: 4px;
    line-height: 1.3;
    color: rgba(0,0,0,0.55);
    word-break: break-all;
  }
  .network-insights-page.dark .event-cell-outbound { color: rgba(255,255,255,0.45); }
  .network-insights-page .dest24-toolbar {

  .network-insights-page .ni-tab-icon-only {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    padding: 0 2px;
  }
</style>

<a-layout id="app" v-cloak :class="themeSwitcher.currentTheme + ' network-insights-page'">
  <a-sidebar></a-sidebar>
  <a-layout id="content-layout">
    <a-layout-content>
      <a-spin :spinning="loading" :delay="200" tip='{{ i18n "loading" }}'>
        <transition name="list" appear>
          <template>
            <a-row key="network-insights-loading" v-if="loading && !fetched">
              <a-card style="text-align:center;padding:30px 0;margin-top:10px;background:transparent;border:none">
                <a-spin tip='{{ i18n "loading" }}'></a-spin>
              </a-card>
            </a-row>
            <a-row key="network-insights-main" :gutter="[isMobile ? 8 : 16, isMobile ? 8 : 12]" v-else>
              <!-- Stat cards -->
              <a-col :xs="12" :sm="6">
                <a-card hoverable>
                  <div class="stat-box">
                    <div class="stat-icon-wrap blue"><a-icon type="database"></a-icon></div>
                    <div>
                      <div class="stat-val">[[ overview.totalActivityRows != null ? overview.totalActivityRows.toLocaleString() : '—' ]]</div>
                      <div class="stat-lbl">{{ i18n "pages.networkInsights.totalRows" }}</div>
                      <div class="stat-sub" v-if="overview.windowLabel">[[ overview.windowLabel ]]</div>
                    </div>
                  </div>
                </a-card>
              </a-col>
              <a-col :xs="12" :sm="6">
                <a-card hoverable>
                  <div class="stat-box">
                    <div class="stat-icon-wrap green"><a-icon type="team"></a-icon></div>
                    <div>
                      <div class="stat-val">[[ overview.distinctClients != null ? overview.distinctClients : '—' ]]</div>
                      <div class="stat-lbl">{{ i18n "pages.networkInsights.distinctClients" }}</div>
                    </div>
                  </div>
                </a-card>
              </a-col>
              <a-col :xs="12" :sm="6">
                <a-card hoverable>
                  <div class="stat-box">
                    <div class="stat-icon-wrap orange"><a-icon type="line-chart"></a-icon></div>
                    <div>
                      <div class="stat-val">[[ trafficRankedCount ]]</div>
                      <div class="stat-lbl">{{ i18n "pages.networkInsights.statTrafficRanked" }}</div>
                    </div>
                  </div>
                </a-card>
              </a-col>
              <a-col :xs="12" :sm="6">
                <a-card hoverable>
                  <div class="stat-box">
                    <div class="stat-icon-wrap purple"><a-icon type="file-text"></a-icon></div>
                    <div>
                      <div class="stat-val">[[ recentLogCount ]]</div>
                      <div class="stat-lbl">{{ i18n "pages.networkInsights.recentLogEntries" }}</div>
                    </div>
                  </div>
                </a-card>
              </a-col>

              <!-- Main card with tabs -->
              <a-col :xs="24">
                <a-card hoverable>
                  <template slot="title">
                    <a-space direction="horizontal">
                      <a-icon type="global" style="font-size:16px"></a-icon>
                      <span>{{ i18n "pages.networkInsights.cardTitle" }}</span>
                    </a-space>
                  </template>
                  <template slot="extra">
                    <a-space>
                      <a-select v-model="hours" size="small" @change="fetchData" style="min-width:110px"
                        :dropdown-class-name="themeSwitcher.currentTheme">
                        <a-select-option :value="24">{{ i18n "pages.networkInsights.hours24" }}</a-select-option>
                        <a-select-option :value="168">{{ i18n "pages.networkInsights.hours168" }}</a-select-option>
                        <a-select-option :value="720">{{ i18n "pages.networkInsights.hours720" }}</a-select-option>
                        <a-select-option :value="0">{{ i18n "pages.networkInsights.allTime" }}</a-select-option>
                      </a-select>
                      <a-tooltip title="{{ i18n "pages.networkInsights.refresh" }}">
                        <a-button size="small" shape="circle" icon="sync"
                          @click="fetchData" :loading="refreshing" />
                      </a-tooltip>
                    </a-space>
                  </template>

                  <a-alert v-if="loadError" type="error" show-icon closable @close="loadError = ''"
                    :message="loadError" style="margin-bottom:12px"></a-alert>

                  <a-tabs class="ni-overview-tabs" :active-key="activeTab" @change="onOverviewTabChange"
                    :animated="false">
                    <a-tab-pane key="accessLog">
                      <span slot="tab" class="ni-tab-icon-only">
                        <a-tooltip placement="top" :title="'{{ i18n "pages.networkInsights.tabAccessLog" }}'">
                          <span><a-icon type="unordered-list" /></span>
                        </a-tooltip>
                      </span>
                  <!-- Tab: Access Log -->
                  <div>
                    <div class="filter-row" style="margin-bottom:14px">
                      <a-input-search
                        v-model="logSearch"
                        :placeholder="'{{ i18n "pages.networkInsights.searchAccessLog" }}'"
                        size="small"
                        allow-clear />
                      <a-select v-model="logEventFilter" size="small" style="min-width:120px"
                        :dropdown-class-name="themeSwitcher.currentTheme">
                        <a-select-option value="all">{{ i18n "pages.networkInsights.allEvents" }}</a-select-option>
                        <a-select-option value="proxied">{{ i18n "pages.networkInsights.eventProxied" }}</a-select-option>
                        <a-select-option value="direct">{{ i18n "pages.networkInsights.eventDirect" }}</a-select-option>
                        <a-select-option value="blocked">{{ i18n "pages.networkInsights.eventBlocked" }}</a-select-option>
                      </a-select>
                    </div>

                    <a-alert type="info" show-icon
                      message="{{ i18n "pages.networkInsights.accessLogNote" }}"
                      style="font-size:12px;margin-bottom:14px"></a-alert>

                    <a-table v-if="filteredAccessLog.length" :columns="colsAccessLog"
                      :data-source="filteredAccessLog" :pagination="accessLogPagination" size="small"
                      row-key="_idx"
                      :scroll="isMobile ? { x: 700 } : {}">
                      <template slot="ts" slot-scope="text">
                        <span class="mono-cell">[[ formatLogTs(text) ]]</span>
                      </template>
                      <template slot="event" slot-scope="text, record">
                        <div>
                          <a-tag v-if="text === 'proxied'" color="blue" style="margin:0">{{ i18n "pages.networkInsights.eventProxied" }}</a-tag>
                          <a-tag v-else-if="text === 'direct'" color="green" style="margin:0">{{ i18n "pages.networkInsights.eventDirect" }}</a-tag>
                          <a-tag v-else-if="text === 'blocked' && record.email" color="red" style="margin:0">{{ i18n "pages.networkInsights.eventBlocked" }}</a-tag>
                          <a-tag v-else-if="text === 'blocked'" color="default" style="margin:0">{{ i18n "pages.networkInsights.eventNonClient" }}</a-tag>
                          <a-tag v-else style="margin:0">[[ text || '—' ]]</a-tag>
                          <div v-if="record.outbound" class="event-cell-outbound mono-cell" :title="record.outbound">
                            {{ i18n "pages.networkInsights.colOutbound" }}: [[ record.outbound ]]
                          </div>
                        </div>
                      </template>
                      <template slot="from" slot-scope="text">
                        <span class="mono-cell">[[ text || '—' ]]</span>
                      </template>
                      <template slot="to" slot-scope="text">
                        <span class="mono-cell">[[ text || '—' ]]</span>
                      </template>
                      <template slot="email" slot-scope="text">
                        <span class="mono-cell">[[ text || '—' ]]</span>
                      </template>
                    </a-table>
                    <div v-else class="empty-box">
                      <div class="empty-box-icon"><a-icon type="file-search"></a-icon></div>
                      <div class="empty-box-title">{{ i18n "pages.networkInsights.noAccessLogEntries" }}</div>
                      <div class="empty-box-desc">{{ i18n "pages.networkInsights.emptyHint" }}</div>
                    </div>
                  </div>
                    </a-tab-pane>

                    <a-tab-pane key="traffic">
                      <span slot="tab" class="ni-tab-icon-only">
                        <a-tooltip placement="top" :title="'{{ i18n "pages.networkInsights.tabTraffic" }}'">
                          <span><a-icon type="bar-chart" /></span>
                        </a-tooltip>
                      </span>
                  <div>
                    <p class="section-hint">{{ i18n "pages.networkInsights.trafficHint" }}</p>
                    <a-table v-if="(overview.topUsersByTraffic || []).length" :columns="colsTraffic"
                      :data-source="overview.topUsersByTraffic" :pagination="trafficPagination" size="small" row-key="email"
                      :scroll="isMobile ? { x: 420 } : {}">
                    </a-table>
                    <div v-else class="empty-box" style="padding:24px 12px">
                      <div class="empty-box-icon"><a-icon type="pie-chart"></a-icon></div>
                      <div class="empty-box-title">{{ i18n "pages.networkInsights.noTrafficYet" }}</div>
                    </div>
                  </div>
                    </a-tab-pane>

                    <a-tab-pane key="dest24">
                      <span slot="tab" class="ni-tab-icon-only">
                        <a-tooltip placement="top" :title="'{{ i18n "pages.networkInsights.tabDest24h" }}'">
                          <span><a-icon type="environment" /></span>
                        </a-tooltip>
                      </span>
                  <div>
                    <p class="section-hint">{{ i18n "pages.networkInsights.dest24Hint" }}</p>
                    <p v-if="panelStored24h" class="section-hint" style="margin-top:-6px">
                      <strong>{{ i18n "pages.networkInsights.panel24Requests" }}</strong>
                      [[ panelStored24h.totalRequests24h != null ? panelStored24h.totalRequests24h.toLocaleString() : '—' ]]
                      · <strong>{{ i18n "pages.networkInsights.panel24Saved" }}</strong>
                      [[ formatLogTs(panelStored24h.updatedAt) ]]
                    </p>
                    <div class="dest24-toolbar">
                      <a-radio-group v-model="destSortMode" size="small" button-style="solid">
                        <a-radio-button value="count">{{ i18n "pages.networkInsights.sortByCount" }}</a-radio-button>
                        <a-radio-button value="name">{{ i18n "pages.networkInsights.sortByName" }}</a-radio-button>
                      </a-radio-group>
                      <a-spin v-if="dest24Fetching" size="small" />
                    </div>
                    <a-row :gutter="[16, 16]">
                      <a-col :xs="24" :lg="12">
                        <div class="section-label" style="margin-top:0">
                          <a-icon type="global" /> {{ i18n "pages.networkInsights.topHostnamesPanel" }}
                        </div>
                        <a-table v-if="sorted24Hostnames.length" :columns="colsDestRank" :data-source="sorted24Hostnames"
                          :pagination="destRankPagination" size="small" row-key="name"
                          :scroll="isMobile ? { x: 280 } : {}">
                        </a-table>
                        <div v-else class="empty-box" style="padding:20px 12px">
                          <div class="empty-box-desc">{{ i18n "pages.networkInsights.emptyHint" }}</div>
                        </div>
                      </a-col>
                      <a-col :xs="24" :lg="12">
                        <div class="section-label" style="margin-top:0">
                          <a-icon type="cluster" /> {{ i18n "pages.networkInsights.topDestIps" }}
                        </div>
                        <a-table v-if="sorted24Ips.length" :columns="colsDestRank" :data-source="sorted24Ips"
                          :pagination="destRankPagination" size="small" row-key="name"
                          :scroll="isMobile ? { x: 280 } : {}">
                        </a-table>
                        <div v-else class="empty-box" style="padding:20px 12px">
                          <div class="empty-box-desc">{{ i18n "pages.networkInsights.emptyHint" }}</div>
                        </div>
                      </a-col>
                    </a-row>
                  </div>
                    </a-tab-pane>
                  </a-tabs>

                </a-card>
              </a-col>
            </a-row>
          </template>
        </transition>
      </a-spin>
    </a-layout-content>
  </a-layout>
</a-layout>

<script>
  (function () {
    function niFmtBytes(t) {
      var n = Number(t);
      if (!isFinite(n) || n < 0) n = 0;
      if (typeof SizeFormatter !== 'undefined' && SizeFormatter.sizeFormat) {
        return SizeFormatter.sizeFormat(n);
      }
      if (!n) return '0 B';
      var u = ['B', 'KB', 'MB', 'GB', 'TB'];
      var i = 0;
      var v = n;
      while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
      return v.toFixed(i > 0 ? 2 : 0) + ' ' + u[i];
    }

    var colsDestRank = [
      { title: '{{ i18n "pages.inbounds.address" }}', dataIndex: 'name', key: 'name', ellipsis: true, className: 'mono-cell' },
      { title: '{{ i18n "pages.networkInsights.count" }}', dataIndex: 'count', key: 'count', width: 96, align: 'right' },
    ];

    var colsTraffic = [
      { title: '{{ i18n "pages.networkInsights.email" }}', dataIndex: 'email', key: 'email', ellipsis: true, className: 'mono-cell' },
      {
        title: '{{ i18n "pages.networkInsights.upload" }}',
        dataIndex: 'up', key: 'up', width: 110, align: 'right',
        customRender: function (text) { return niFmtBytes(text); },
      },
      {
        title: '{{ i18n "pages.networkInsights.download" }}',
        dataIndex: 'down', key: 'down', width: 110, align: 'right',
        customRender: function (text) { return niFmtBytes(text); },
      },
      {
        title: '{{ i18n "pages.networkInsights.traffic" }}',
        dataIndex: 'total', key: 'total', width: 120, align: 'right',
        customRender: function (text) { return niFmtBytes(text); },
      },
    ];

    var colsAccessLog = [
      {
        title: '{{ i18n "pages.networkInsights.colTime" }}',
        dataIndex: 'ts', key: 'ts', width: 160,
        scopedSlots: { customRender: 'ts' },
        sorter: function (a, b) { return a.ts - b.ts; },
        defaultSortOrder: 'descend',
      },
      {
        title: '{{ i18n "pages.networkInsights.colEvent" }}',
        dataIndex: 'event', key: 'event', width: 148,
        scopedSlots: { customRender: 'event' },
        filters: [
          { text: 'Proxied', value: 'proxied' },
          { text: 'Direct', value: 'direct' },
          { text: 'Blocked', value: 'blocked' },
        ],
        onFilter: function (value, record) { return record.event === value; },
      },
      {
        title: '{{ i18n "pages.networkInsights.email" }}',
        dataIndex: 'email', key: 'email', ellipsis: true,
        scopedSlots: { customRender: 'email' },
      },
      {
        title: '{{ i18n "pages.networkInsights.colFrom" }}',
        dataIndex: 'from', key: 'from', ellipsis: true,
        scopedSlots: { customRender: 'from' },
      },
      {
        title: '{{ i18n "pages.networkInsights.colTo" }}',
        dataIndex: 'to', key: 'to', ellipsis: true,
        scopedSlots: { customRender: 'to' },
      },
    ];

    const app = new Vue({
      delimiters: ['[[', ']]'],
      el: '#app',
      mixins: [MediaQueryMixin],
      data: {
        themeSwitcher,
        loading: true,
        fetched: false,
        refreshing: false,
        loadError: '',
        hours: 24,
        activeTab: 'accessLog',
        logSearch: '',
        logEventFilter: 'all',
        overview: {},
        dest24TopIps: [],
        dest24Loaded: false,
        dest24Fetching: false,
        destSortMode: 'count',
        colsDestRank: colsDestRank,
        colsTraffic: colsTraffic,
        colsAccessLog: colsAccessLog,
        trafficPagination: { pageSize: 15, hideOnSinglePage: true, size: 'small' },
        accessLogPagination: { pageSize: 50, hideOnSinglePage: true, size: 'small', showSizeChanger: true, pageSizeOptions: ['25', '50', '100', '200'] },
        destRankPagination: { pageSize: 40, hideOnSinglePage: true, size: 'small' },
      },
      computed: {
        trafficRankedCount() {
          var a = this.overview.topUsersByTraffic;
          return Array.isArray(a) ? a.length : 0;
        },
        recentLogCount() {
          var a = this.overview.recentAccessLog;
          return Array.isArray(a) ? a.length : 0;
        },
